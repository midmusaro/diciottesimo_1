<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18° di Giorgio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  font-family: 'Montserrat', sans-serif;
  overflow: hidden;
  color: white;
  text-align: center;
}

/* ===== INTRO TESTO ===== */
.intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: #d4af37;
  z-index: 10;
  animation: fadeOut 2s ease 3s forwards;
}

.intro h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5em;
  letter-spacing: 3px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  text-align: center;
}

@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

/* ===== CONTENUTO PRINCIPALE ===== */
.main {
  display: none;
  height: 100vh;
  background: radial-gradient(circle at top, #1a1a1a, #000 70%);
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  max-width: 750px;
  padding: 50px;
  animation: contentFade 2s ease;
}

@keyframes contentFade {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 4em;
  color: #d4af37;
  margin-bottom: 10px;
  background: linear-gradient(45deg, #d4af37, #fff9c4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { background-position: -200px; }
  100% { background-position: 200px; }
}

.subtitle {
  letter-spacing: 4px;
  margin-bottom: 30px;
}

/* Countdown compatto e più grande */
.countdown {
  margin-bottom: 20px;
  color: #d4af37;
  font-size: 1.5em; /* leggermente più grande */
  font-weight: 500;
  letter-spacing: 1px;
}

/* Dettagli */
.details {
  line-height: 2em;
  margin-bottom: 40px;
  font-size: 1.15em;
}

.details a {
  color: #f5e6a6;
  font-weight: bold;
  text-decoration: underline;
  transition: 0.3s;
}

.details a:hover {
  color: #fff;
  text-decoration: none;
}

/* Bottone elegante */
.button {
  padding: 18px 50px;
  background: linear-gradient(45deg, #d4af37, #f5e6a6);
  border-radius: 50px;
  color: black;
  font-weight: bold;
  text-decoration: none;
  transition: 0.3s;
}

.button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 35px rgba(212,175,55,0.8);
}

/* Nota conferma con più spazio sotto il bottone */
.confirmation {
  margin-top: 25px; /* più spazio tra bottone e nota */
  font-size: 0.95em;
  color: #f5e6a6;
  font-style: italic;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="intro">
  <h1>Sei invitato al… ✨</h1>
</div>

<div class="main" id="mainContent">
  <div class="container">
    <h2>18° di Giorgio</h2>
    <div class="subtitle">30 APRILE 2026</div>

    <div class="countdown" id="countdown"></div>

    <div class="details">
      🕘 Ore 21:00 <br>
      📍<a href="https://www.google.com/maps/search/?api=1&query=Ristorante+da+Enzo+Tricase+Alessano" target="_blank">
	Ristorante da Enzo – Tricase Alessano</a><br>      
	👗 Dress code: Elegante
    </div>

    <a class="button"
       href="https://wa.me/393664868020?text=Ciao%20Giorgio,%20grazie%20per%20avermi%20invitato%20al%20tuo%2018%C2%B0,%20ci%20sar%C3%B2"
       target="_blank">
       CI SARAI?
    </a>
    <div class="confirmation">
      Gradita conferma entro il 25 aprile
    </div>
  </div>
</div>

<script>
// Mostra il contenuto principale dopo intro
setTimeout(() => {
  document.getElementById("mainContent").style.display = "flex";
}, 4000);

// Countdown compatto
const eventDate = new Date("April 30, 2026 21:00:00").getTime();

setInterval(function() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    "Tra " + days + "g " + hours + "h " + minutes + "m " + seconds + "s";

}, 1000);
</script>

</body>
</html>
